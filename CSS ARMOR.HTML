<!DOCTYPE html>
<html>
<head>
    <title>ELITE ARMOUR</title>

    <link rel="icon" type="image/png" href="https://t4.ftcdn.net/jpg/03/03/69/09/240_F_303690932_N8nFOusbionEi7e6QuGZDKsV1SMSkyPy.jpg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 {
            color: #00c6ff;
            margin-bottom: 10px;
        }

        img {
            border-radius: 50%;
            margin-bottom: 15px;
        }

        label {
            font-size: 14px;
            display: block;
            text-align: left;
            margin-left: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        input[type="checkbox"] {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00c6ff;
            border: none;
            border-radius: 6px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }

        a {
            color: #00c6ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        p {
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>ELITE ARMOUR</h1>

    <img src="https://t4.ftcdn.net/jpg/03/03/69/09/240_F_303690932_N8nFOusbionEi7e6QuGZDKsV1SMSkyPy.jpg" width="100">

    <form>

        <label>Username/Email:</label>
        <input type="text" placeholder="Enter your username or email">

        <label>Password:</label>
        <input type="password" placeholder="Enter your password">

        <input type="checkbox"> Remember Me<br><br>

        <button type="submit">Login</button>

    </form>

    <p>
        <a href="signup.html">Create Account</a> |
        <a href="#">Forgot Password?</a> |
        <a href="https://www.google.com" target="_blank">Help</a>
    </p>

    <p>
        New here? Click on "Create Account" to register.<br>
        If you forgot your password, use the "Forgot Password?" link above.
    </p>

</div>

</body>
</html>
